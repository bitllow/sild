# Full local Sild stack: Postgres + Redis + the four backend services.
#   docker compose up -d
# REST → http://localhost:8080   WS → ws://localhost:8081/v1/ws
#
# Realtime requires Redis because sild-api (publish) and sild-ws (connections)
# are separate processes (ARCHITECTURE §3a).

x-backend-env: &backend-env
  SILD_ENV: development
  DB_DRIVER: postgres
  DB_DSN: "host=postgres port=5432 user=sild password=sild dbname=sild sslmode=disable"
  SILD_BROKER: redis
  SILD_REDIS_URL: "redis://redis:6379"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sild
      POSTGRES_PASSWORD: sild
      POSTGRES_DB: sild
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sild"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build: ./backend
    command: ["/usr/local/bin/sild-migrate"]
    environment: *backend-env
    depends_on:
      postgres: {condition: service_healthy}

  api:
    build: ./backend
    command: ["/usr/local/bin/sild-api"]
    environment:
      <<: *backend-env
      SILD_HTTP_ADDR: ":8080"
    ports: ["8080:8080"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}

  ws:
    build: ./backend
    command: ["/usr/local/bin/sild-ws"]
    environment:
      <<: *backend-env
      SILD_WS_ADDR: ":8081"
    ports: ["8081:8081"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}

  worker:
    build: ./backend
    command: ["/usr/local/bin/sild-worker", "-jobs", "webhook,archive"]
    environment: *backend-env
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}

volumes:
  pgdata:
